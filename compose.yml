include:
  - firecrawl/docker-compose.yaml

name: opencode
services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm

    command: ["--config", "/app/config.yaml", "--port", "4000"]

    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro

    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

    ports:
      - "0:4000"

    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:4000/health/liveliness'); sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped

  opencode:
    build: .
    container_name: opencode

    working_dir: "${WORKDIR:-${PWD?WORKDIR or PWD must be set to code path}}"

    ports:
      - "4096:4096"

    volumes:
      - ./data/share:/home/node/.local/share/opencode
      - ./data/state:/home/node/.local/state/opencode
      - ./opencode-config.json:/home/node/.config/opencode/config.json:ro
      - "${WORKDIR:-${PWD?WORKDIR or PWD must be set to code path}}:${WORKDIR:-${PWD?WORKDIR or PWD must be set to code path}}"

    environment:
      TZ: ${TZ:-UTC}
      OPENCODE_DISABLE_AUTOUPDATE: ${OPENCODE_DISABLE_AUTOUPDATE:-1}
      #OPENCODE_ENABLE_EXA: ${OPENCODE_ENABLE_EXA:-1}
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
      FIRECRAWL_API_URL: http://host.docker.internal:3002
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-local}

    restart: unless-stopped

    extra_hosts:
      - "host.docker.internal:host-gateway"

    depends_on:
      api:
        condition: service_healthy
      litellm:
        condition: service_healthy
